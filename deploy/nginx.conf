# ANPR System — Nginx reverse proxy with HTTPS
# Copy to: /etc/nginx/sites-available/anpr
# Enable:  sudo ln -s /etc/nginx/sites-available/anpr /etc/nginx/sites-enabled/anpr
#          sudo nginx -t && sudo systemctl reload nginx
#
# Generate self-signed cert (development / LAN):
#   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/ssl/private/anpr.key \
#     -out    /etc/ssl/certs/anpr.crt \
#     -subj   "/CN=anpr.local/O=ANPR/C=PK"
#
# For production use Let's Encrypt:
#   sudo certbot --nginx -d your-domain.com

# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=api_limit:10m  rate=30r/s;
limit_req_zone  $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS — Frontend (Next.js :3000) ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/ssl/certs/anpr.crt;
    ssl_certificate_key /etc/ssl/private/anpr.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    limit_conn conn_limit 20;

    # ── API routes → FastAPI backend ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Larger body for image uploads
        client_max_body_size 5m;
    }

    # ── Auth endpoint — stricter rate limit ──────────────────────────────────
    location /api/auth/login {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket stream ──────────────────────────────────────────────────────
    location /api/stream {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;   # keep WS alive for 1 hour
        proxy_send_timeout 3600s;
    }

    # ── Frontend (Next.js) ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Next.js hot-reload (dev only — remove in production) ─────────────────
    location /_next/webpack-hmr {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
