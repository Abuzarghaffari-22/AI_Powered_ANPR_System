[supervisord]
nodaemon=true
logfile=%(here)s/../FYP/logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
loglevel=info
pidfile=/tmp/anpr_supervisord.pid

; ── Backend (FastAPI + uvicorn) ──────────────────────────────────────────────
[program:anpr_backend]
command=%(here)s/../FYP/backend/venv/bin/uvicorn main:app
    --host 127.0.0.1
    --port 8000
    --workers 1
    --no-access-log
directory=%(here)s/../FYP/backend
environment=PYTHONPATH="%(here)s/../FYP/backend"
autostart=true
autorestart=true
startretries=5
startsecs=5
stopwaitsecs=10
stdout_logfile=%(here)s/../FYP/logs/backend.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=%(here)s/../FYP/logs/uvicorn_errors.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=3

; ── Frontend (Next.js) ───────────────────────────────────────────────────────
[program:anpr_frontend]
command=npm start
directory=%(here)s/../FYP/frontend
environment=PORT="3000",NODE_ENV="production"
autostart=true
autorestart=true
startretries=5
startsecs=8
stopwaitsecs=10
stdout_logfile=%(here)s/../FYP/logs/frontend.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=%(here)s/../FYP/logs/frontend.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=3

; ── Supervisor web UI (optional — remove if not needed) ──────────────────────
[inet_http_server]
port=127.0.0.1:9001

[supervisorctl]
serverurl=http://127.0.0.1:9001

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface
